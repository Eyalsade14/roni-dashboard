<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תיבת המייל של רוני</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAFAFA;
      --surface: #FFFFFF;
      --text: #18181B;
      --text-secondary: #52525B;
      --text-muted: #A1A1AA;
      --border: #E4E4E7;
      --border-subtle: #F4F4F5;
      --accent: #5B5BD6;
      --accent-hover: #4F46E5;
      --accent-soft: #EEF2FF;
      --danger: #DC2626;
      --warning: #D97706;
      --success: #16A34A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    *::selection { background: var(--accent-soft); color: var(--text); }

    body {
      font-family: 'Heebo', -apple-system, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ============ LOGIN ============ */
    #login-screen {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-box {
      background: var(--surface);
      padding: 40px 36px;
      border-radius: 12px;
      border: 1px solid var(--border);
      max-width: 380px;
      width: 100%;
    }
    .login-box h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }
    .login-box .subtitle {
      color: var(--text-muted);
      margin-bottom: 28px;
      font-size: 13px;
    }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      background: var(--surface);
      direction: ltr;
      text-align: right;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .login-btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-family: inherit;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .login-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .login-btn:disabled { opacity: 0.6; cursor: wait; }
    .login-error {
      background: #FEF2F2;
      color: var(--danger);
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      border: 1px solid #FECACA;
    }

    /* ============ DASHBOARD ============ */
    #dashboard {
      display: none;
      max-width: 1240px;
      margin: 0 auto;
      padding: 32px 28px;
    }
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
      flex-wrap: wrap;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 2px;
    }
    .user-info {
      color: var(--text-muted);
      font-size: 13px;
    }
    .header-actions { display: flex; gap: 6px; }
    .header-btn {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 7px 14px;
      border-radius: 6px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .header-btn:hover {
      background: var(--surface);
      color: var(--text);
      border-color: var(--text-muted);
    }
    .header-btn.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .header-btn.primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    /* ============ STATS BAR ============ */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }
    @media (max-width: 640px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
    .stat-card {
      background: var(--surface);
      padding: 16px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: border-color 0.15s;
    }
    .stat-card:hover { border-color: var(--text-muted); }
    .stat-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    /* Status dots (used in stats labels and table) */
    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-high   { background: var(--danger); }
    .dot-medium { background: var(--warning); }
    .dot-low    { background: var(--success); }
    .dot-other  { background: var(--text-muted); }

    /* ============ TABLE ============ */
    .table-wrapper {
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: transparent;
      padding: 10px 16px;
      text-align: right;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 14px;
      vertical-align: middle;
      color: var(--text);
    }
    tr.email-row {
      cursor: pointer;
      transition: background 0.1s;
    }
    tr.email-row:hover { background: var(--bg); }
    tr.email-row:last-child td { border-bottom: none; }

    .urgency-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }
    .summary-cell {
      max-width: 380px;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .waiting-cell {
      white-space: nowrap;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--text-secondary);
    }
    .waiting-warm { color: var(--warning); }
    .waiting-old  { color: var(--danger); }

    .date-cell {
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }

    .text-muted { color: var(--text-muted); }

    /* ============ EMPTY/LOADING/ERROR ============ */
    .empty-state, .loading-state, .error-state {
      background: var(--surface);
      padding: 72px 24px;
      text-align: center;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .state-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }
    .state-desc {
      font-size: 13px;
      color: var(--text-muted);
    }
    .error-state .state-title { color: var(--danger); }

    /* ============ MODAL ============ */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(24,24,27,0.5);
      backdrop-filter: blur(2px);
      display: none;
      align-items: flex-start;
      justify-content: center;
      z-index: 100;
      padding: 48px 24px 24px;
      overflow-y: auto;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
      max-width: 680px;
      width: 100%;
      padding: 28px;
      animation: modalIn 0.15s ease-out;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal h2 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }
    .modal .meta {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--text-secondary);
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .modal .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .modal .label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin-top: 18px;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .modal .summary-text {
      color: var(--text-secondary);
      line-height: 1.6;
      font-size: 14px;
    }
    .modal textarea.draft {
      width: 100%;
      background: var(--surface);
      padding: 14px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.7;
      min-height: 220px;
      max-height: 400px;
      border: 1px solid var(--border);
      font-family: inherit;
      resize: vertical;
      direction: rtl;
      text-align: right;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .modal textarea.draft:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-family: inherit;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }
    .btn.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .btn.primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      color: white;
    }
    .btn.danger {
      color: var(--danger);
    }
    .btn.danger:hover {
      background: #FEF2F2;
      border-color: var(--danger);
      color: var(--danger);
    }
    .btn-spacer { flex: 1; }

    /* ============ CONFIRM ============ */
    #confirm-modal .modal { max-width: 400px; }
    #confirm-modal h2 { margin-bottom: 6px; }
    #confirm-modal p {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    #confirm-modal .modal-actions {
      justify-content: flex-end;
      margin-top: 0;
    }

    /* ============ TOAST ============ */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--text);
      color: white;
      padding: 9px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      z-index: 200;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-box">
      <h1>תיבת המייל של רוני</h1>
      <div class="subtitle">נדרשת התחברות כדי לצפות</div>
      <div id="login-error" class="login-error" style="display:none;"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">אימייל</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">סיסמה</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn" id="login-btn">התחבר</button>
      </form>
    </div>
  </div>

  <!-- Main Dashboard -->
  <div id="dashboard">
    <header>
      <div>
        <h1>תיבת המייל</h1>
        <div class="user-info" id="user-info"></div>
      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="loadEmails()">רענן</button>
        <button class="header-btn" onclick="signOut()">יציאה</button>
      </div>
    </header>

    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">סה״כ ממתינים</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label"><span class="dot dot-high"></span>דחיפות גבוהה</div>
        <div class="stat-value" id="stat-high">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label"><span class="dot dot-medium"></span>דחיפות בינונית</div>
        <div class="stat-value" id="stat-medium">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label"><span class="dot dot-low"></span>דחיפות נמוכה</div>
        <div class="stat-value" id="stat-low">0</div>
      </div>
    </div>

    <div id="content">
      <div class="loading-state">
        <div class="state-title">טוען</div>
        <div class="state-desc">קצת סבלנות...</div>
      </div>
    </div>
  </div>

  <!-- Email Modal -->
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <h2 id="modal-title"></h2>
      <div class="meta" id="modal-meta"></div>

      <div class="label">תקציר</div>
      <div class="summary-text" id="modal-summary"></div>

      <div class="label">טיוטת תשובה</div>
      <textarea class="draft" id="modal-draft" placeholder="כתוב/י כאן את התשובה..."></textarea>

      <div class="modal-actions">
        <button class="btn primary" onclick="openInGmail()">פתח בג'ימייל</button>
        <button class="btn" onclick="copyDraft()">העתק</button>
        <div class="btn-spacer"></div>
        <button class="btn danger" onclick="markAsDone()">סמן כטופל</button>
        <button class="btn" onclick="closeModal()">סגור</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-backdrop" id="confirm-modal">
    <div class="modal">
      <h2 id="confirm-title">אישור</h2>
      <p id="confirm-message"></p>
      <div class="modal-actions">
        <button class="btn" id="confirm-no">ביטול</button>
        <button class="btn primary" id="confirm-yes">אישור</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://qmeefopegcsaezhjgkwy.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_XhD1NbdgJxd80b-KM4NUXQ_y5IvAc2r';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentEmail = null;
    const urgencyOrder = { high: 1, medium: 2, low: 3 };

    /* ---------- HEBREW CUSTOM DIALOGS ---------- */
    function customConfirm(message, title = 'אישור') {
      return new Promise((resolve) => {
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-message').textContent = message;
        const modal = document.getElementById('confirm-modal');
        const yes = document.getElementById('confirm-yes');
        const no  = document.getElementById('confirm-no');
        no.style.display = '';
        yes.textContent = 'אישור';
        modal.classList.add('open');

        const cleanup = (val) => {
          modal.classList.remove('open');
          yes.onclick = null;
          no.onclick = null;
          resolve(val);
        };
        yes.onclick = () => cleanup(true);
        no.onclick  = () => cleanup(false);
      });
    }

    function customAlert(message, title = 'הודעה') {
      return new Promise((resolve) => {
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-message').textContent = message;
        const modal = document.getElementById('confirm-modal');
        const yes = document.getElementById('confirm-yes');
        const no  = document.getElementById('confirm-no');
        yes.textContent = 'אישור';
        no.style.display = 'none';
        modal.classList.add('open');
        yes.onclick = () => {
          modal.classList.remove('open');
          no.style.display = '';
          yes.onclick = null;
          resolve();
        };
      });
    }

    /* ---------- AUTH ---------- */
    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) showDashboard(session.user);
      else showLogin();
    }

    function showLogin() {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
    }

    function showDashboard(user) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('user-info').textContent = user.email;
      loadEmails();
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errBox = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');
      errBox.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'מתחבר...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });

      btn.disabled = false;
      btn.textContent = 'התחבר';

      if (error) {
        errBox.textContent = 'שגיאה בהתחברות. בדוק/י שהאימייל והסיסמה נכונים.';
        errBox.style.display = 'block';
      }
    });

    window.signOut = async function () { await supabase.auth.signOut(); };

    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) showDashboard(session.user);
      else if (event === 'SIGNED_OUT') showLogin();
    });

    /* ---------- HELPERS ---------- */
    const senderTypeMap = {
      student: 'סטודנט',
      colleague: 'מרצה',
      administration: 'הנהלה',
      other: 'אחר',
    };
    function senderTypeHebrew(type) {
      if (!type) return '—';
      return senderTypeMap[String(type).toLowerCase().trim()] || type;
    }

    const classificationMap = {
      absence_notification: 'היעדרות',
      grade_question: 'שאלת ציון',
      assignment_help: 'עזרה במטלה',
      system_alert: 'התראת מערכת',
      system_notification: 'הודעת מערכת',
      system_error_notification: 'שגיאת מערכת',
      spam_or_malformed: 'ספאם',
      technical_issue: 'תקלה טכנית',
      test: 'בדיקה',
    };
    function classificationHebrew(c) {
      if (!c) return '—';
      return classificationMap[String(c).toLowerCase().trim()] || c;
    }

    function urgencyRank(level) {
      return urgencyOrder[(level || '').toLowerCase()] || 99;
    }

    function urgencyCell(level) {
      const l = (level || '').toLowerCase();
      let dotClass = 'dot-other', label = level || 'לא ידוע';
      if (l === 'high')   { dotClass = 'dot-high';   label = 'גבוהה'; }
      else if (l === 'medium') { dotClass = 'dot-medium'; label = 'בינונית'; }
      else if (l === 'low')    { dotClass = 'dot-low';    label = 'נמוכה'; }
      return `<div class="urgency-cell"><span class="dot ${dotClass}"></span>${escapeHtml(label)}</div>`;
    }

    function urgencyMeta(level) {
      const l = (level || '').toLowerCase();
      let dotClass = 'dot-other', label = level || 'לא ידוע';
      if (l === 'high')   { dotClass = 'dot-high';   label = 'דחיפות גבוהה'; }
      else if (l === 'medium') { dotClass = 'dot-medium'; label = 'דחיפות בינונית'; }
      else if (l === 'low')    { dotClass = 'dot-low';    label = 'דחיפות נמוכה'; }
      return `<div class="meta-item"><span class="dot ${dotClass}"></span>${escapeHtml(label)}</div>`;
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function formatDate(iso) {
      if (!iso) return '—';
      try {
        return new Date(iso).toLocaleString('he-IL', {
          day: '2-digit', month: '2-digit',
          hour: '2-digit', minute: '2-digit'
        });
      } catch { return '—'; }
    }

    function waitingTime(iso) {
      if (!iso) return { text: '—', cls: '' };
      const now  = new Date();
      const then = new Date(iso);
      const diffMin = Math.floor((now - then) / 60000);

      if (diffMin < 1)   return { text: 'עכשיו',          cls: '' };
      if (diffMin < 60)  return { text: `${diffMin} דק׳`, cls: '' };

      const diffHr = Math.floor(diffMin / 60);
      if (diffHr < 24) {
        const cls = diffHr < 4 ? '' : (diffHr < 12 ? 'waiting-warm' : 'waiting-old');
        return { text: `${diffHr} שע׳`, cls };
      }
      const diffDay = Math.floor(diffHr / 24);
      return { text: `${diffDay} ימים`, cls: 'waiting-old' };
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    function updateStats(total, high, medium, low) {
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-high').textContent = high;
      document.getElementById('stat-medium').textContent = medium;
      document.getElementById('stat-low').textContent = low;
    }

    /* ---------- LOAD EMAILS ---------- */
    window.loadEmails = async function () {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading-state"><div class="state-title">טוען</div><div class="state-desc">קצת סבלנות...</div></div>';

      const { data, error } = await supabase.from('emails').select('*');

      if (error) {
        content.innerHTML = `<div class="error-state"><div class="state-title">שגיאה בטעינה</div><div class="state-desc">נסי לרענן. אם זה ממשיך — בדקי חיבור.</div></div>`;
        updateStats(0, 0, 0, 0);
        return;
      }

      const all = data || [];
      const highCount = all.filter(e => urgencyRank(e.urgency_level) === 1).length;
      const medCount  = all.filter(e => urgencyRank(e.urgency_level) === 2).length;
      const lowCount  = all.filter(e => urgencyRank(e.urgency_level) === 3).length;
      updateStats(all.length, highCount, medCount, lowCount);

      if (all.length === 0) {
        content.innerHTML = '<div class="empty-state"><div class="state-title">תיבת המייל ריקה</div><div class="state-desc">כשמייל חדש יגיע, הוא יופיע כאן.</div></div>';
        return;
      }

      const sorted = [...all].sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

      content.innerHTML = `
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>דחיפות</th>
                <th>סוג שולח</th>
                <th>סיווג</th>
                <th>תקציר</th>
                <th>התקבל</th>
                <th>המתנה</th>
              </tr>
            </thead>
            <tbody>
              ${sorted.map((e, i) => {
                const wait = waitingTime(e.created_at);
                return `
                  <tr class="email-row" data-idx="${i}">
                    <td>${urgencyCell(e.urgency_level)}</td>
                    <td>${escapeHtml(senderTypeHebrew(e.sender_type))}</td>
                    <td>${escapeHtml(classificationHebrew(e.classification))}</td>
                    <td class="summary-cell">${escapeHtml(e.summary || '')}</td>
                    <td class="date-cell">${formatDate(e.created_at)}</td>
                    <td class="waiting-cell ${wait.cls}">${wait.text}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;

      document.querySelectorAll('.email-row').forEach((row) => {
        row.addEventListener('click', () => {
          const idx = parseInt(row.dataset.idx, 10);
          openModal(sorted[idx]);
        });
      });
    };

    /* ---------- MODAL ---------- */
    window.openModal = function (email) {
      currentEmail = email;
      document.getElementById('modal-title').textContent = email.student_name || 'ללא שם';
      const wait = waitingTime(email.created_at);
      document.getElementById('modal-meta').innerHTML = `
        ${urgencyMeta(email.urgency_level)}
        <div class="meta-item">${escapeHtml(classificationHebrew(email.classification))}</div>
        <div class="meta-item">${escapeHtml(senderTypeHebrew(email.sender_type))}</div>
        <div class="meta-item text-muted">המתין ${wait.text}</div>
      `;
      document.getElementById('modal-summary').textContent = email.summary || 'אין תקציר';
      document.getElementById('modal-draft').value = email.draft_reply || '';
      document.getElementById('modal').classList.add('open');
    };

    window.closeModal = function () {
      document.getElementById('modal').classList.remove('open');
      currentEmail = null;
    };

    window.copyDraft = async function () {
      const text = document.getElementById('modal-draft').value;
      try {
        await navigator.clipboard.writeText(text);
        showToast('הטיוטה הועתקה');
      } catch {
        showToast('שגיאה בהעתקה');
      }
    };

    window.openInGmail = function () {
      if (!currentEmail) return;
      const text    = document.getElementById('modal-draft').value;
      const body    = encodeURIComponent(text);
      const to      = encodeURIComponent(currentEmail.student_email || '');
      const subject = encodeURIComponent('תשובה: ' + String(currentEmail.summary || '').slice(0, 60));
      const url = `https://mail.google.com/mail/?view=cm&fs=1&to=${to}&su=${subject}&body=${body}`;
      window.open(url, '_blank');
    };

    window.markAsDone = async function () {
      if (!currentEmail) return;
      const ok = await customConfirm('המייל יוסר מהרשימה. פעולה זו אינה הפיכה.', 'סימון כטופל');
      if (!ok) return;

      let query = supabase.from('emails').delete();
      if (currentEmail.id !== undefined && currentEmail.id !== null) {
        query = query.eq('id', currentEmail.id);
      } else {
        query = query
          .eq('created_at', currentEmail.created_at)
          .eq('student_name', currentEmail.student_name || '')
          .eq('classification', currentEmail.classification || '');
      }

      const { error } = await query;
      if (error) {
        await customAlert('המחיקה נכשלה. נסי שוב.', 'שגיאה');
        return;
      }
      closeModal();
      showToast('סומן כטופל');
      loadEmails();
    };

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });
    document.getElementById('confirm-modal').addEventListener('click', (e) => {
      if (e.target.id === 'confirm-modal') {
        document.getElementById('confirm-modal').classList.remove('open');
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
        document.getElementById('confirm-modal').classList.remove('open');
      }
    });

    checkAuth();
  </script>
</body>
</html>
